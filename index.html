<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Web UI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #0f3460; }
    .header h1 { font-size: 18px; color: #e94560; }
    .status { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #0f3460; }
    .status.connected { background: #0a5c36; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; }
    .msg { margin-bottom: 15px; max-width: 80%; }
    .msg.user { margin-left: auto; }
    .msg-bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.5; }
    .msg.user .msg-bubble { background: #e94560; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-bubble { background: #0f3460; border-bottom-left-radius: 4px; }
    .msg.assistant { white-space: pre-wrap; }
    .msg.tool { font-size: 12px; opacity: 0.7; }
    .input-area { padding: 15px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 10px; }
    .input-area input { flex: 1; padding: 12px 16px; border: none; border-radius: 24px; background: #0f3460; color: #eee; font-size: 14px; outline: none; }
    .input-area input:focus { box-shadow: 0 0 0 2px #e94560; }
    .input-area button { padding: 12px 24px; border: none; border-radius: 24px; background: #e94560; color: white; font-size: 14px; cursor: pointer; }
    .input-area button:hover { background: #ff6b6b; }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing { font-style: italic; opacity: 0.6; padding: 5px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Pi Web UI</h1>
    <span class="status" id="status">连接中...</span>
    <span style="margin-left:auto;font-size:12px;opacity:0.6">GLM-5 + 多团队协作</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="typing" id="typing"></div>
  <div class="input-area">
    <input type="text" id="input" placeholder="输入消息... (Shift+Enter 换行)" />
    <button id="send" onclick="sendMessage()">发送</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const typingEl = document.getElementById('typing');
    let isStreaming = false;
    let currentText = '';

    // SSE 连接
    const eventSource = new EventSource('/api/events');
    eventSource.onopen = () => {
      statusEl.textContent = '已连接';
      statusEl.classList.add('connected');
    };
    eventSource.onerror = () => {
      statusEl.textContent = '断开连接';
      statusEl.classList.remove('connected');
    };
    eventSource.onmessage = (e) => {
      const event = JSON.parse(e.data);
      handleEvent(event);
    };

    function handleEvent(event) {
      if (event.type === 'agent_start') {
        isStreaming = true;
        sendBtn.disabled = true;
        typingEl.textContent = '思考中...';
      }
      if (event.type === 'agent_end') {
        isStreaming = false;
        sendBtn.disabled = false;
        typingEl.textContent = '';
        currentText = '';
      }
      if (event.type === 'message_update') {
        const delta = event.assistantMessageEvent;
        if (delta?.type === 'text_delta') {
          currentText += delta.delta;
          updateLastMessage(currentText);
          typingEl.textContent = '';
        }
        if (delta?.type === 'toolcall_start') {
          typingEl.textContent = `执行工具: ${delta.partial?.name || '...'}`;
        }
      }
      if (event.type === 'message_end' && event.message?.role === 'assistant') {
        const text = event.message.content?.find(c => c.type === 'text')?.text || '';
        if (text) updateLastMessage(text);
      }
    }

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function updateLastMessage(text) {
      let last = messagesEl.querySelector('.msg.assistant:last-child .msg-bubble');
      if (!last) {
        addMessage('assistant', text);
        last = messagesEl.querySelector('.msg.assistant:last-child .msg-bubble');
      }
      last.textContent = text;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || isStreaming) return;
      
      addMessage('user', message);
      inputEl.value = '';
      
      try {
        await fetch('/api/prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
      } catch (e) {
        console.error(e);
      }
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
